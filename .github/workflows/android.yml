name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'minicraft-android/**'
      - 'src/MiniCraft.java'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'minicraft-android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minicraft-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Grant execute permission for gradlew
        run: |
          if [ ! -f gradlew ]; then
            # Generate wrapper if missing
            curl -L https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
            unzip -q gradle.zip
            ./gradle-8.2/bin/wrapper --gradle-version 8.2
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: minicraft-debug-apk
          path: minicraft-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Build Release APK
        run: ./gradlew assembleRelease
        continue-on-error: true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: minicraft-release-apk
          path: minicraft-android/app/build/outputs/apk/release/app-release-unsigned.apk
